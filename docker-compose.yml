services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pubmed
      POSTGRES_PASSWORD: pubmed
      POSTGRES_DB: pubmed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubmed"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  airflow:
    image: apache/airflow:2.10.0-python3.11
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pubmed:pubmed@postgres:5432/pubmed
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/dags/src
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow connections add pubmed_postgres --conn-type postgres --conn-host postgres --conn-port 5432 --conn-login pubmed --conn-password pubmed --conn-schema pubmed || true &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        airflow webserver & airflow scheduler
      "

  api:
    build: .
    command: uvicorn src.serving.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pubmed:pubmed@postgres:5432/pubmed
    volumes:
      - ./src:/app/src
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  mlflow_data:
  model_cache:
